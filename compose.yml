# anya — single-host Docker Compose deploy (e.g. a DigitalOcean Droplet via remote context).
#
#   docker context use anya-droplet                      # target the host (one-time setup in doc)
#   op run --env-file=.env -- docker compose up -d --build
#
# Plain `docker compose up -d --build` also works when ./.env holds concrete values —
# Compose auto-reads ./.env for the ${VAR} interpolation below. Use `op run` (1Password)
# or `bws run` (Bitwarden) when .env holds reference URIs instead of secrets.
#
# See doc/DEPLOYMENT.md for the full workflow.

services:
  anya:
    build:
      context: .
      dockerfile: Dockerfile
    image: anya:latest
    restart: unless-stopped
    # anya is a scheduler/worker, not a server: no inbound port to publish.
    command:
      - serve
      - --interval=${ANYA_INTERVAL:-86400}
      - --phases=${ANYA_PHASES:-default}
    environment:
      # ONLY secrets (API keys) belong here. Every non-secret setting — email
      # recipients/provider/sender, the crawl4ai URL, fetcher and path knobs — lives in
      # config.toml (baked into the image, or mounted; see the volumes note below).
      # --- LLM backends: set only the key your config.toml actually resolves to ---
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # --- Email delivery secret (provider/sender/recipients are in config.toml [email]) ---
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    volumes:
      # Deployer-curated job dir. The deploy ships THIS (rsync/git), not the image — change
      # ANYA_JOB_DIR to point elsewhere on the host. Read-write: jobs write their own state
      # (e.g. grant-hunter's state.toml) here, so it persists across restarts AND rebuilds.
      # If this is missing/empty, `anya serve` refuses to start (no silent zero-job run).
      - ${ANYA_JOB_DIR:-./job}:/app/job
      # Process-level state — blotter, long-term memory, shared HTTP cache.
      - ./data:/app/data
      # config.toml carries all non-secret settings. The image bakes one; mount your own to
      # override without a rebuild. When using the crawl profile, that config must set
      # [fetch] crawl4ai_base_url = "http://crawl4ai:11235" (the service name on this network).
      # - ./config.toml:/app/config.toml:ro

  # Optional. Heavy image; only started with `--profile crawl`. Enable when a job uses the
  # crawl4ai fetcher for JS-heavy / bot-blocked pages. anya reaches it at the URL in
  # config.toml [fetch] crawl4ai_base_url (set it to http://crawl4ai:11235 for this network).
  crawl4ai:
    # Pinned by digest so a moved `:basic` tag can't silently change what runs. The tag stays
    # as a readable label; the digest is what actually gets pulled. To take a newer build later,
    # re-fetch the digest and replace it here:
    #   docker buildx imagetools inspect unclecode/crawl4ai:basic
    image: unclecode/crawl4ai:basic@sha256:576b8cc98724f1c714d8fc7306758531588b1c5f07667700f4fae89d3861ec67
    profiles: ['crawl']
    restart: unless-stopped
    expose:
      - '11235'
    healthcheck:
      # Slim image: use the in-image interpreter, not curl/wget.
      test: ['CMD', 'python', '-c',
             "import urllib.request; urllib.request.urlopen('http://localhost:11235/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
