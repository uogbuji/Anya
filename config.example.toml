[models]
default = "fast"                     # used when inference() omits model=

[models.aliases]
fast = "or-haiku"
best-reasoning = "or-opus"
cheapest = "local-qwen"

# OpenRouter: cloud, broad model menu. `provider = "openrouter"` is sugar
# that fills in base_url and picks up OPENROUTER_API_KEY from env.
[models.backends.or-haiku]
provider = "openrouter"
model = "anthropic/claude-haiku-4.5"

[models.backends.or-opus]
provider = "openrouter"
model = "anthropic/claude-opus-4.7"

[models.backends.or-llama]
provider = "openrouter"
model = "meta-llama/llama-3.3-70b-instruct"

# Can select free models from https://openrouter.ai/models?max_price=0&output_modalities=text
[models.backends.or-deepseek-free]
provider = "openrouter"
model = "deepseek/deepseek-v4-flash:free"

# Local: any OpenAI-compatible server. oMLX is the preferred local runner —
# use a grammar-capable build for native JSON-schema support.
[models.backends.local-qwen]
provider = "openai"
model = "qwen3.6-mlx"
base_url = "http://localhost:8080/v1"

# Anthropic direct, if you don't want to go through OpenRouter.
[models.backends.claude-haiku-direct]
provider = "anthropic"
model = "claude-haiku-4-5-20251001"

# --- Everything below is NON-SECRET instance config. Secrets (API keys) stay in env. ---

# Email reports. The provider's API key (RESEND_API_KEY / UNOSEND_API_KEY) lives in env;
# only non-secret settings belong here.
[email]
provider = "resend"                       # "resend" (default) or "unosend"
to = ["you@example.com"]                  # report recipients (array; CLI --email_to overrides)
from = "Anya <anya@yourdomain.com>"       # sender address

# Web fetchers.
[fetch]
crawl4ai_base_url = "http://localhost:11235"        # for the crawl4ai fetcher (compose: http://crawl4ai:11235)
reddit_user_agent = "python:anya:0.2 (by /u/anya)"  # Reddit asks the UA to identify your bot
tavily_max_results = 10                             # tavily search fetcher (key: TAVILY_API_KEY in env)
brave_max_results = 10                              # brave search fetcher (key: BRAVE_API_KEY in env)

# Filesystem paths (relative to the working dir; CLI flags --blotter/--memory override).
[paths]
blotter = "data/blotter.txt"
memory = "data/memory.txt"
http_cache = "data/http-cache.sqlite"

[blotter]
lock_timeout = 30                         # seconds to wait for the blotter file lock
